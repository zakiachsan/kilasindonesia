services:
  app:
    image: ghcr.io/zakiachsan/kilasindonesia:latest
    container_name: kilasindonesia-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: https://kilasindonesia.com
      NEXTAUTH_URL: https://kilasindonesia.com
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  uploads_data:
