name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          build-args: |
            NEXT_PUBLIC_APP_URL=https://kilasindonesia.com
            NEXTAUTH_URL=https://kilasindonesia.com

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/apps/kilasindonesia/web
            docker pull ghcr.io/${{ github.repository }}:latest
            docker compose -f docker-compose.local.yml down
            docker compose -f docker-compose.local.yml up -d --wait

            # Wait for healthcheck to pass (--wait already handles this)
            echo "Container started, verifying health..."
            sleep 5

            # Run database schema sync
            echo "Syncing database schema..."
            docker exec kilasindonesia-app npx drizzle-kit push --force || echo "Warning: Schema sync failed"

            # Verify deployment - check health endpoint
            echo "Verifying deployment..."
            HEALTH_STATUS=$(docker exec kilasindonesia-app wget -qO- http://localhost:3000/api/health 2>/dev/null || echo "FAILED")
            echo "Health check: $HEALTH_STATUS"

            # Cleanup old images to save disk space
            echo "Cleaning up old Docker images..."
            docker image prune -af --filter "until=24h"

            # Show disk usage
            echo "Disk usage:"
            df -h / | tail -1

  cleanup:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old container images
        uses: actions/delete-package-versions@v5
        with:
          package-name: kilasindonesia
          package-type: container
          min-versions-to-keep: 3
          delete-only-untagged-versions: false
